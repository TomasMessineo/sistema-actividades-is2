services:
  # 1. BASE DE DATOS: PostgreSQL 15
  # Elegida por su robustez en el manejo de transacciones y concurrencia de cupos.
  db:
    image: postgres:15-alpine
    container_name: sportify_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sportify_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 2. BACKEND: Spring Boot (Java 17)
  # Configurado para disciplinas de Yoga, Funcional y Pilates con límite de 30 personas.
  backend:
    image: eclipse-temurin:17-jdk-alpine
    container_name: sportify_backend
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sportify_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2 # Caché de dependencias Maven
    depends_on:
      - db
    command: ./mvnw spring-boot:run

  # 3. FRONTEND: React + Vite (Node 20)
  # Incluye Hot Reload optimizado para entornos Docker.
  frontend:
    image: node:20-alpine
    container_name: sportify_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Detecta cambios en tiempo real
    volumes:
      - ./frontend:/app
      - /app/node_modules # Aísla las librerías del contenedor de las locales
    command: sh -c "npm install && npm run dev -- --host"

  # 4. GESTOR DE BASE DE DATOS: pgAdmin 4
  # Acceso visual desde http://localhost:8081
  pgadmin:
    image: dpage/pgadmin4
    container_name: sportify_pgadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sportify.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      - db
